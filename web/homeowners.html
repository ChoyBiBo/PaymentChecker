<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeowners — HOA Payment Checker</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="32" height="32" viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="10" fill="#3b82f6"/><path d="M26 10L8 24h4v18h12v-10h4v10h12V24h4L26 10z" fill="white"/></svg>
      <div class="sidebar-logo-text">HOA Checker<span>Admin Panel</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html" data-nav="dashboard"><span class="nav-icon">⊞</span> Dashboard</a>
      <a href="/homeowners.html" data-nav="homeowners"><span class="nav-icon">👥</span> Homeowners</a>
      <a href="/payments.html" data-nav="payments"><span class="nav-icon">💳</span> Payments</a>
      <a href="/qr-print.html" data-nav="qr"><span class="nav-icon">⬛</span> QR Codes</a>
      <a href="/reports.html" data-nav="reports"><span class="nav-icon">📊</span> Reports</a>
      <a href="/announcements.html" data-nav="announcements"><span class="nav-icon">📢</span> Announcements</a>
      <a href="/amenities.html" data-nav="amenities"><span class="nav-icon">🏊</span> Amenities</a>
      <a href="/amenity-bookings.html" data-nav="bookings"><span class="nav-icon">📅</span> Bookings</a>
      <a href="/app-users.html" data-nav="app-users"><span class="nav-icon">📱</span> App Users</a>
      <a href="/vehicles.html" data-nav="vehicles"><span class="nav-icon">🚗</span> Vehicles</a>
      <a href="/entry-logs.html" data-nav="entry-logs"><span class="nav-icon">📋</span> Entry Logs</a>
      <a href="/settings.html" data-nav="settings"><span class="nav-icon">⚙</span> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info"><strong id="header-user">—</strong><span id="header-role"></span></div>
      <a href="#" onclick="logout()" class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:6px;">Sign Out</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <h1>Homeowners</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Homeowner</button>
      </div>
    </header>

    <div class="page-content">
      <div class="card">
        <div class="toolbar">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Search by name or lot..." oninput="onSearch()">
          </div>
          <select class="form-control" id="status-filter" style="width:160px;" onchange="loadHomeowners()">
            <option value="">All Homeowners</option>
            <option value="updated">Updated</option>
            <option value="outdated">Outdated</option>
          </select>
          <span id="count-label" style="font-size:13px;color:#64748b;white-space:nowrap;"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Lot</th><th>Block</th><th>Name</th><th>Contact</th>
                <th>Monthly Due</th><th>Status</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="homeowners-tbody">
              <tr><td colspan="7" class="loading-overlay">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="form-modal-title">Add Homeowner</div>
      <button class="modal-close" onclick="closeFormModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name <span class="required">*</span></label>
          <input id="f-name" type="text" class="form-control" placeholder="Juan Dela Cruz">
        </div>
        <div class="form-group">
          <label class="form-label">Lot Number <span class="required">*</span></label>
          <input id="f-lot" type="text" class="form-control" placeholder="12">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Block Number</label>
          <input id="f-block" type="text" class="form-control" placeholder="3">
        </div>
        <div class="form-group">
          <label class="form-label">Monthly Due (₱)</label>
          <input id="f-due" type="number" class="form-control" placeholder="500.00" step="0.01" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <input id="f-address" type="text" class="form-control" placeholder="House address">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input id="f-phone" type="text" class="form-control" placeholder="09xx-xxx-xxxx">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="f-email" type="email" class="form-control" placeholder="email@example.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="f-notes" class="form-control" rows="2" placeholder="Optional notes..."></textarea>
      </div>
      <p id="form-error" class="form-error"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeFormModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveHomeowner()">Save</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal-overlay" id="view-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title" id="view-modal-title">Homeowner Details</div>
      <button class="modal-close" onclick="closeViewModal()">✕</button>
    </div>
    <div class="modal-body" id="view-modal-body">Loading...</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeViewModal()">Close</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/homeowners.js"></script>
</body>
</html>
