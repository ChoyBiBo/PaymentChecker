<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicles & Stickers — HOA Payment Checker</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="32" height="32" viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="10" fill="#3b82f6"/><path d="M26 10L8 24h4v18h12v-10h4v10h12V24h4L26 10z" fill="white"/></svg>
      <div class="sidebar-logo-text">HOA Checker<span>Admin Panel</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html" data-nav="dashboard"><span class="nav-icon">⊞</span> Dashboard</a>
      <a href="/homeowners.html" data-nav="homeowners"><span class="nav-icon">👥</span> Homeowners</a>
      <a href="/payments.html" data-nav="payments"><span class="nav-icon">💳</span> Payments</a>
      <a href="/payment-proofs.html" data-nav="payment-proofs"><span class="nav-icon">🧾</span> Payment Proofs</a>
      <a href="/qr-print.html" data-nav="qr"><span class="nav-icon">⬛</span> QR Codes</a>
      <a href="/reports.html" data-nav="reports"><span class="nav-icon">📊</span> Reports</a>
      <a href="/announcements.html" data-nav="announcements"><span class="nav-icon">📢</span> Announcements</a>
      <a href="/amenities.html" data-nav="amenities"><span class="nav-icon">🏊</span> Amenities</a>
      <a href="/amenity-bookings.html" data-nav="bookings"><span class="nav-icon">📅</span> Bookings</a>
      <a href="/app-users.html" data-nav="app-users"><span class="nav-icon">📱</span> App Users</a>
      <a href="/vehicles.html" data-nav="vehicles"><span class="nav-icon">🚗</span> Vehicles</a>
      <a href="/entry-logs.html" data-nav="entry-logs"><span class="nav-icon">📋</span> Entry Logs</a>
      <a href="/settings.html" data-nav="settings"><span class="nav-icon">⚙</span> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info"><strong id="header-user">—</strong><span id="header-role"></span></div>
      <a href="#" onclick="logout()" class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:6px;">Sign Out</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header"><h1>Vehicles &amp; Stickers</h1></header>
    <div class="page-content">

      <!-- Tabs -->
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button class="btn btn-primary" id="tab-stickers" onclick="showTab('stickers')">Sticker Requests</button>
        <button class="btn btn-ghost" id="tab-vehicles" onclick="showTab('vehicles')">All Vehicles</button>
      </div>

      <!-- Sticker Requests Tab -->
      <div id="pane-stickers">
        <div class="card" style="margin-bottom:16px;">
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
            <div class="form-group" style="margin:0;min-width:150px;">
              <label class="form-label">Status</label>
              <select id="f-status" class="form-control" onchange="loadStickers()">
                <option value="">All</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
              </select>
            </div>
            <div class="form-group" style="margin:0;min-width:120px;">
              <label class="form-label">Year</label>
              <input id="f-year" type="number" class="form-control" placeholder="e.g. 2026" onchange="loadStickers()">
            </div>
            <button class="btn btn-ghost btn-sm" onclick="loadStickers()">Refresh</button>
          </div>
        </div>
        <div class="card">
          <div id="stickers-list"><div class="loading-overlay">Loading...</div></div>
        </div>
      </div>

      <!-- All Vehicles Tab -->
      <div id="pane-vehicles" style="display:none;">
        <div class="card">
          <div class="card-header">
            <div class="card-title">All Registered Vehicles</div>
            <button class="btn btn-ghost btn-sm" onclick="loadVehicles()">Refresh</button>
          </div>
          <div id="vehicles-list"><div class="loading-overlay">Loading...</div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Review modal -->
<div class="modal-overlay" id="review-modal" style="display:none;">
  <div class="modal" style="max-width:440px;">
    <div class="modal-header">
      <div class="modal-title" id="review-title">Review Sticker Request</div>
      <button class="modal-close" onclick="closeReviewModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="review-details" style="margin-bottom:12px;"></div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea id="review-notes" class="form-control" rows="3" placeholder="Add review notes..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeReviewModal()">Cancel</button>
      <button class="btn btn-danger" onclick="submitReview('reject')">Reject</button>
      <button class="btn btn-success" onclick="submitReview('approve')">Approve</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/vehicles.js"></script>
</body>
</html>
