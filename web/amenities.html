<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amenities — HOA Connect</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="32" height="32" viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="10" fill="#1a6b7b"/><path d="M26 10L8 24h4v18h12v-10h4v10h12V24h4L26 10z" fill="white"/></svg>
      <div class="sidebar-logo-text">HOA Connect<span>Community Management</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html" data-nav="dashboard"><span class="nav-icon">⊞</span> Dashboard</a>
      <a href="/homeowners.html" data-nav="homeowners"><span class="nav-icon">👥</span> Homeowners</a>
      <a href="/payments.html" data-nav="payments"><span class="nav-icon">💳</span> Payments</a>
      <a href="/payment-proofs.html" data-nav="payment-proofs"><span class="nav-icon">🧾</span> Payment Proofs</a>
      <a href="/qr-print.html" data-nav="qr"><span class="nav-icon">⬛</span> QR Codes</a>
      <a href="/reports.html" data-nav="reports"><span class="nav-icon">📊</span> Reports</a>
      <a href="/announcements.html" data-nav="announcements"><span class="nav-icon">📢</span> Announcements</a>
      <a href="/amenities.html" data-nav="amenities"><span class="nav-icon">🏊</span> Amenities</a>
      <a href="/amenity-bookings.html" data-nav="bookings"><span class="nav-icon">📅</span> Bookings</a>
      <a href="/app-users.html" data-nav="app-users"><span class="nav-icon">📱</span> App Users</a>
      <a href="/vehicles.html" data-nav="vehicles"><span class="nav-icon">🚗</span> Vehicles</a>
      <a href="/renovation-requirements.html" data-nav="renovation-requirements"><span class="nav-icon">🏠</span> Reno Requirements</a>
      <a href="/renovation-permits.html" data-nav="renovation-permits"><span class="nav-icon">📋</span> Reno Permits</a>
      <a href="/entry-logs.html" data-nav="entry-logs"><span class="nav-icon">📋</span> Entry Logs</a>
      <a href="/settings.html" data-nav="settings"><span class="nav-icon">⚙</span> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info"><strong id="header-user">—</strong><span id="header-role"></span></div>
      <a href="#" onclick="logout()" class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:6px;">Sign Out</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header"><h1>Amenities</h1></header>
    <div class="page-content">
      <div style="display:grid;grid-template-columns:1fr 1.6fr;gap:20px;align-items:start;">

        <!-- Add / Edit form -->
        <div class="card">
          <div class="card-header">
            <div class="card-title" id="form-title">Add Amenity</div>
          </div>
          <input type="hidden" id="edit-id">
          <div class="form-group">
            <label class="form-label">Name <span class="required">*</span></label>
            <input id="f-name" type="text" class="form-control" placeholder="e.g. Swimming Pool">
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="f-desc" class="form-control" rows="2" placeholder="Short description"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Location</label>
              <input id="f-loc" type="text" class="form-control" placeholder="e.g. Block A">
            </div>
            <div class="form-group">
              <label class="form-label">Capacity</label>
              <input id="f-cap" type="number" class="form-control" placeholder="Max persons" min="1">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Photo</label>
            <input id="f-img" type="file" class="form-control" accept="image/*" onchange="previewAmenityImg(this)">
            <img id="f-img-preview" src="" alt="" style="display:none;width:100%;max-height:160px;object-fit:cover;border-radius:6px;margin-top:8px;border:1px solid var(--border)">
            <button id="f-img-clear" class="btn btn-ghost btn-sm" style="display:none;margin-top:4px;" onclick="clearAmenityImg()">Remove Photo</button>
          </div>
          <div style="display:flex;gap:8px;margin-top:4px;">
            <button class="btn btn-primary" onclick="saveAmenity()">Save</button>
            <button class="btn btn-ghost" onclick="resetForm()">Clear</button>
          </div>
        </div>

        <!-- Amenities list -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">All Amenities</div>
            <button class="btn btn-primary btn-sm" onclick="loadAmenities()">Refresh</button>
          </div>
          <div id="amenity-list"><div class="loading-overlay">Loading...</div></div>
        </div>

      </div>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/amenities.js"></script>
</body>
</html>
